<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waabi AI Image ScrollAnimation | thakuma.dev</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <section class="hero">
        <div class="hero-img">
            <video src="./assets/hero.mp4" autoplay muted loop playsinline></video>
        </div>
        <div class="hero-header">
            <h1>A study of motion unfolding inside a single frame</h1>
        </div>
        <div class="hero-copy">
            <h3>The moment where stillness transform into movement</h3>
        </div>
    </section>

    <section class="about">
        <div class="about-images">
            <div class="about-imgs-col" id="about-imgs-col-1"></div>
            <div class="about-imgs-col" id="about-imgs-col-2"></div>
            <div class="about-imgs-col" id="about-imgs-col-3"></div>
            <div class="about-imgs-col" id="about-imgs-col-4"></div>
        </div>
        <div class="about-header">
            <h3>
                Fragments of motion and atmosphere gathered into a drifting collection
                of quiet visual moments.
            </h3>
        </div>
    </section>

    <section class="outro">
        <h3>The frame settles back into quiet stillness.</h3>
    </section>
    <script type="module" src="./script.js"></script>
</body>

</html>
