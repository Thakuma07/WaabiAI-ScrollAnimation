<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waabi AI Image ScrollAnimation | thakuma.dev</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <section class="hero">
        <div class="hero-img">
            <img src="/hero.jpg" alt="" />
        </div>
        <div class="hero-header">
            <h1>A study of motion unfolding inside a single frame</h1>
        </div>
        <div class="hero-copy">
            <h3>The moment where stillness transform into movement</h3>
        </div>
    </section>

    <section class="about">
        <div class="about-images">
            <div class="about-imgs-col" id="about-imgs-col-1">
                <div class="img">
                    <img src="/img1.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img2.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img3.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img4.jpg" alt="" />
                </div>
            </div>
            <div class="about-imgs-col" id="about-imgs-col-2">
                <div class="img">
                    <img src="/img5.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img6.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img7.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img8.jpg" alt="" />
                </div>
            </div>
            <div class="about-imgs-col" id="about-imgs-col-3">
                <div class="img">
                    <img src="/img9.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img10.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img11.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img12.jpg" alt="" />
                </div>
            </div>
            <div class="about-imgs-col" id="about-imgs-col-4">
                <div class="img">
                    <img src="/img13.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img14.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img15.jpg" alt="" />
                </div>
                <div class="img">
                    <img src="/img16.jpg" alt="" />
                </div>
            </div>
        </div>
        <div class="about-header">
            <h3>
                Fragments of motion and atmosphere gathered into a drifting collection
                of quiet visual moments.
            </h3>
        </div>
    </section>

    <section class="outro">
        <h3>The frame settles back into quiet stillness.</h3>
    </section>
    <script type="module" src="./script.js"></script>
</body>
</html>
